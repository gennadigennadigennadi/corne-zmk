# Enable deep sleep (power down when idle to preserve battery)
CONFIG_ZMK_SLEEP=y

# Increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Report battery level over BLE + on nice_view display
CONFIG_ZMK_BATTERY_REPORTING=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Enable ZMK Studio for Realtime Keymap Updates
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Enter deep sleep after 5 minutes (300000 ms) of inactivity
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_KEYBOARD_NAME="Corne"
